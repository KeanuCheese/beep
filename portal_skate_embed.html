<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PortalSkate - Encender equipo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    :root {
      --bg: url('./plantilla_pantalla_fondo.jpg');
      --screen-off: url('./plantilla_pantalla_OFF_DEF.png');
      --screen-on: url('./plantilla_pantalla_ON_DEF.png');
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0c0f15;
      font-family: Arial, Helvetica, sans-serif;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 360px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: var(--bg);
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
    }

    .screen {
      position: relative;
      width: 100%;
      height: 100%;
      aspect-ratio: 3 / 2;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
      overflow: hidden;
    }


    .screen::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 3;
      background-image: var(--screen-off);
      background-position: center;
      background-repeat: no-repeat;
      background-size: contain;
      transition: opacity 220ms ease;
      pointer-events: none;
    }

    .screen.on::before { background-image: var(--screen-on); }

    .embed {
      position: absolute;
      z-index: 1;
      inset: 24.3% 23.5% 20.4% 27.9%;
      width: 48.6%;
      height: 55.3%;
      border: 0;
      opacity: 0;
      pointer-events: none;
      background: #05070a;
      transition: opacity 260ms ease;
    }

    .screen.on .embed {
      opacity: 1;
      pointer-events: auto;
    }

    .hint {
      position: absolute;
      z-index: 4;
      left: 50%;
      bottom: 7.6%;
      transform: translateX(-50%) translateY(4px);
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(8px, 1vw, 11px);
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(236, 241, 246, 0.82);
      opacity: 0;
      padding: 4px 6px;
      border-radius: 2px;
      background: rgba(9, 12, 17, 0.24);
      transition: opacity 160ms ease, transform 160ms ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .screen:hover .hint,
    .screen:focus-visible .hint {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .screen.on .hint { opacity: 0; }
  </style>
</head>
<body>
  <main class="scene">
    <button class="screen" id="screenButton" aria-label="Encender equipo">
      <iframe
        class="embed"
        id="meetingFrame"
        title="PortalSkate"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
      ></iframe>
      <span class="hint">encender</span>
    </button>
  </main>

  <script>
    const meetingUrl = 'https://nexusgenesis.odooconsultores.cl/meetkeanu';
    const screenButton = document.getElementById('screenButton');
    const meetingFrame = document.getElementById('meetingFrame');

    screenButton.addEventListener('click', () => {
      if (screenButton.classList.contains('on')) return;

      screenButton.classList.add('on');
      screenButton.setAttribute('aria-label', 'Equipo encendido');
      meetingFrame.src = meetingUrl;
    });
  </script>
</body>
</html>
