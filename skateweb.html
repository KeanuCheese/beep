<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skateweb</title>
    <style>
      :root {
        --screen-left: 18.2%;
        --screen-top: 18.5%;
        --screen-width: 63.6%;
        --screen-height: 54.8%;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: url("./plantilla_pantalla_fondo.png") center / cover no-repeat fixed;
        font-family: Arial, Helvetica, sans-serif;
      }

      .pc {
        position: relative;
        width: min(92vw, 1100px);
        aspect-ratio: 16 / 9;
        cursor: pointer;
        user-select: none;
      }

      .pc__template,
      .pc__template-on {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .pc__template-on {
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .pc.is-on .pc__template-on {
        opacity: 1;
      }

      .pc__display {
        position: absolute;
        left: var(--screen-left);
        top: var(--screen-top);
        width: var(--screen-width);
        height: var(--screen-height);
        border: 0;
        overflow: hidden;
        border-radius: 0.6vw;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        background: #000;
      }

      .pc__display iframe {
        width: 100%;
        height: 100%;
        border: 0;
        opacity: 0;
        transition: opacity 0.25s ease;
        pointer-events: none;
      }

      .pc.is-on .pc__display iframe {
        opacity: 1;
        pointer-events: auto;
      }

      .hint {
        position: absolute;
        bottom: -2.2rem;
        left: 50%;
        transform: translateX(-50%);
        color: white;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
        font-size: clamp(0.85rem, 1.1vw, 1rem);
        letter-spacing: 0.02em;
      }

      .pc.is-on .hint::after {
        content: " (encendida)";
      }

      @media (max-width: 800px) {
        .pc {
          width: 98vw;
        }

        .pc__display {
          border-radius: 1vw;
        }
      }
    </style>
  </head>
  <body>
    <main class="pc" id="pc" aria-label="Pantalla interactiva" role="button" tabindex="0">
      <img class="pc__template" src="./plantilla_pantalla_off.png" alt="Plantilla pantalla apagada" />
      <img class="pc__template-on" src="./plantilla_pantalla_on.png" alt="Plantilla pantalla encendida" />

      <section class="pc__display" aria-hidden="true">
        <iframe
          title="Nexus Genesis"
          src="https://nexusgenesis.odooconsultores.cl/meetkeanu"
          loading="lazy"
          allow="fullscreen"
          referrerpolicy="no-referrer"
        ></iframe>
      </section>

      <span class="hint">Haz clic en la pantalla para encender/apagar</span>
    </main>

    <script>
      const pc = document.getElementById("pc");

      const togglePower = () => {
        pc.classList.toggle("is-on");
      };

      pc.addEventListener("click", togglePower);
      pc.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          togglePower();
        }
      });
    </script>
  </body>
</html>
