<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skateweb</title>
    <style>
      :root {
        /* Área donde se verá la web dentro del marco */
        --web-left: 18.2%;
        --web-top: 18.5%;
        --web-width: 63.6%;
        --web-height: 54.8%;

        /* Posición y tamaño de plantillas OFF/ON para ajuste fino */
        --overlay-left: 0%;
        --overlay-top: 0%;
        --overlay-width: 100%;
        --overlay-height: 100%;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #000;
        font-family: Arial, Helvetica, sans-serif;
      }

      .stage {
        position: relative;
        width: min(96vw, 1280px);
        aspect-ratio: 16 / 9;
        background: url("./plantilla_pantalla_fondo.png") center / contain no-repeat;
        user-select: none;
      }

      .stage__web {
        position: absolute;
        left: var(--web-left);
        top: var(--web-top);
        width: var(--web-width);
        height: var(--web-height);
        border: 0;
        overflow: hidden;
        background: #fff;
      }

      .stage__web iframe {
        width: 100%;
        height: 100%;
        border: 0;
      }

      .overlay {
        position: absolute;
        left: var(--overlay-left);
        top: var(--overlay-top);
        width: var(--overlay-width);
        height: var(--overlay-height);
        object-fit: contain;
        pointer-events: none;
      }

      .overlay--on {
        opacity: 0;
      }

      .stage.is-on .overlay--on {
        opacity: 1;
      }

      .stage.is-on .overlay--off {
        opacity: 0;
      }

      .power {
        position: absolute;
        left: 50%;
        bottom: 3%;
        transform: translateX(-50%);
        z-index: 5;
        border: 0;
        border-radius: 999px;
        padding: 0.6rem 1rem;
        font-size: clamp(0.82rem, 1vw, 1rem);
        font-weight: 700;
        cursor: pointer;
        color: #fff;
        background: rgba(0, 0, 0, 0.75);
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
      }

      .power:hover {
        background: rgba(0, 0, 0, 0.9);
      }

      .status {
        position: absolute;
        top: 2%;
        left: 50%;
        transform: translateX(-50%);
        z-index: 5;
        color: #fff;
        background: rgba(0, 0, 0, 0.6);
        border-radius: 999px;
        padding: 0.35rem 0.8rem;
        font-size: clamp(0.78rem, 0.9vw, 0.9rem);
      }
    </style>
  </head>
  <body>
    <main class="stage" id="stage" aria-label="Skateweb con encendido de equipo">
      <div class="status" id="status">Equipo apagado</div>

      <section class="stage__web" aria-label="Área web">
        <iframe id="webframe" title="Nexus Genesis" allow="fullscreen" referrerpolicy="no-referrer"></iframe>
      </section>

      <img class="overlay overlay--off" src="./plantilla_pantalla_off.png" alt="Plantilla apagada" />
      <img class="overlay overlay--on" src="./plantilla_pantalla_on.png" alt="Plantilla encendida" />

      <button class="power" id="power" type="button">Encender equipo</button>
    </main>

    <script>
      const stage = document.getElementById('stage');
      const power = document.getElementById('power');
      const status = document.getElementById('status');
      const frame = document.getElementById('webframe');
      const webUrl = 'https://nexusgenesis.odooconsultores.cl/meetkeanu';

      let isOn = false;

      const updateUI = () => {
        stage.classList.toggle('is-on', isOn);

        if (isOn) {
          if (!frame.src) {
            frame.src = webUrl;
          }
          power.textContent = 'Apagar equipo';
          status.textContent = 'Equipo encendido';
        } else {
          frame.removeAttribute('src');
          power.textContent = 'Encender equipo';
          status.textContent = 'Equipo apagado';
        }
      };

      power.addEventListener('click', () => {
        isOn = !isOn;
        updateUI();
      });

      updateUI();
    </script>
  </body>
</html>
