<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skateweb</title>
    <style>
      :root {
        /* Ajusta estos valores si necesitas afinar el encuadre del iframe en el área blanca */
        --screen-left: 18.2%;
        --screen-top: 18.5%;
        --screen-width: 63.6%;
        --screen-height: 54.8%;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, Helvetica, sans-serif;
        background: #000;
      }

      .stage {
        position: relative;
        width: min(96vw, 1280px);
        aspect-ratio: 16 / 9;
        background: url("./plantilla_pantalla_fondo.png") center / contain no-repeat;
      }

      .stage__web {
        position: absolute;
        left: var(--screen-left);
        top: var(--screen-top);
        width: var(--screen-width);
        height: var(--screen-height);
        border: 0;
        border-radius: 0.5vw;
        background: #fff;
        overflow: hidden;
      }

      .stage__web iframe {
        width: 100%;
        height: 100%;
        border: 0;
      }

      @media (max-width: 900px) {
        .stage {
          width: 100vw;
        }

        .stage__web {
          border-radius: 1vw;
        }
      }
    </style>
  </head>
  <body>
    <main class="stage" aria-label="Skateweb con fondo y pantalla embebida">
      <section class="stage__web" aria-label="Contenido web dentro de la pantalla blanca">
        <iframe
          title="Nexus Genesis"
          src="https://nexusgenesis.odooconsultores.cl/meetkeanu"
          loading="lazy"
          allow="fullscreen"
          referrerpolicy="no-referrer"
        ></iframe>
      </section>
    </main>
  </body>
</html>
